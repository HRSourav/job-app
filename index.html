<!DOCTYPE html>
<html>
<head>
  <title>RightO Hiring</title>

  <style>
    body {
      font-family: Arial;
      background: linear-gradient(to right, #eef2f7, #dde6f0);
    }

    .container {
      width: 420px;
      margin: 50px auto;
      background: white;
      padding: 20px;
      border-radius: 10px;
    }

    input, textarea {
      width: 100%;
      padding: 8px;
      margin-bottom: 10px;
    }

    button {
      width: 100%;
      padding: 10px;
      background: blue;
      color: white;
      border: none;
    }

    .whatsapp {
      background: green;
      margin-top: 10px;
    }
  </style>

</head>
<body>

<div class="container">

<div style="text-align:center;">
  <img src="logo.png" width="120">
</div>

<h2>Job Application Form</h2>

<form onsubmit="submitForm(event)">

<input type="text" id="name" placeholder="Full Name" required>
<input type="email" id="email" placeholder="Email" required>
<input type="text" id="phone" placeholder="Phone Number" required>

<textarea id="address" placeholder="Address"></textarea>

<button type="submit">Apply Now</button>

</form>

<a href="https://wa.me/919876543210?text=Hi%20I%20applied%20for%20job" target="_blank">
  <button class="whatsapp">Chat on WhatsApp</button>
</a>

<p id="msg"></p>

</div>

<script>
function submitForm(e) {
  e.preventDefault();

  let data = {
    name: document.getElementById("name").value,
    email: document.getElementById("email").value,
    phone: document.getElementById("phone").value,
    address: document.getElementById("address").value
  };

  fetch("https://script.google.com/macros/s/AKfycbx_Ji8KbkhRXBBUIIHApRhbTTys_-PW96F_JPlODv-s6gjSJRjLjcyoI3vFNZo-4tRf/exec", {
    method: "POST",
    body: JSON.stringify(data)
  })
  .then(() => {
    document.getElementById("msg").innerHTML = "Application Submitted ✅";
  });
}
</script>

</body>
</html>
