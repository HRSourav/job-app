<!DOCTYPE html>
<html>
<head>
  <title>RightO Careers</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: url('https://images.unsplash.com/photo-1497366216548-37526070297c') no-repeat center/cover;
    }

    .overlay {
      background: rgba(0,0,0,0.6);
      min-height: 100vh;
      padding-top: 50px;
    }

    .container {
      width: 420px;
      margin: auto;
      background: #ffffff;
      padding: 25px;
      border-radius: 12px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    }

    .logo {
      text-align: center;
      margin-bottom: 15px;
    }

    .logo img {
      width: 150px;
    }

    h2 {
      text-align: center;
      margin-bottom: 5px;
    }

    .subtitle {
      text-align: center;
      color: gray;
      margin-bottom: 20px;
      font-size: 14px;
    }

    label {
      font-weight: bold;
      font-size: 14px;
    }

    input, textarea {
      width: 100%;
      padding: 10px;
      margin: 6px 0 15px;
      border-radius: 6px;
      border: 1px solid #ccc;
    }

    textarea {
      height: 70px;
    }

    button {
      width: 100%;
      padding: 12px;
      background: linear-gradient(to right, #4b3cff, #6a5cff);
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 15px;
      cursor: pointer;
    }

    .whatsapp {
      background: #25D366;
      margin-top: 10px;
    }

    .footer {
      text-align: center;
      font-size: 12px;
      color: #777;
      margin-top: 15px;
    }
  </style>
</head>

<body>

<div class="overlay">

<div class="container">

<!-- ✅ REAL LOGO -->
<div class="logo">
  <img src="./logo.png" alt="RightO Logo">
</div>

<h2>RightO Careers</h2>
<p class="subtitle">Apply for current openings</p>

<form onsubmit="submitForm(event)">

<label>Full Name *</label>
<input type="text" id="name" required>

<label>Email *</label>
<input type="email" id="email" required>

<label>Phone *</label>
<input type="text" id="phone" required>

<label>Alternate Phone</label>
<input type="text" id="altphone">

<label>Aadhaar Number (Optional)</label>
<input type="text" id="aadhaar">

<label>Qualification *</label>
<input type="text" id="qualification" required>

<label>Current Address</label>
<textarea id="address"></textarea>

<button type="submit">Submit Application</button>

</form>

<a href="https://wa.me/916239971732?text=Hi%20I%20applied%20for%20job" target="_blank">
  <button class="whatsapp">Chat on WhatsApp</button>
</a>

<p id="msg"></p>

<div class="footer">
  © RightO Careers | Secure Application Portal
</div>

</div>

</div>

<script>
function submitForm(e) {
  e.preventDefault();

  let data = {
    name: document.getElementById("name").value,
    email: document.getElementById("email").value,
    phone: document.getElementById("phone").value,
    altphone: document.getElementById("altphone").value,
    aadhaar: document.getElementById("aadhaar").value,
    qualification: document.getElementById("qualification").value,
    address: document.getElementById("address").value
  };

  fetch("https://script.google.com/macros/s/AKfycbx_Ji8KbkhRXBBUIIHApRhbTTys_-PW96F_JPlODv-s6gjSJRjLjcyoI3vFNZo-4tRf/exec", {
    method: "POST",
    body: JSON.stringify(data)
  })
  .then(() => {
    document.getElementById("msg").innerHTML = "Application Submitted ✅";
  });
}
</script>

</body>
</html>
