<!DOCTYPE html>
<html>
<head>
  <title>RightO Careers</title>

  <style>
    * { box-sizing: border-box; }

    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: url('https://images.unsplash.com/photo-1497366216548-37526070297c') no-repeat center/cover;
    }

    .overlay {
      background: rgba(0,0,0,0.6);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .container {
      width: 100%;
      max-width: 420px;
      background: white;
      padding: 25px;
      border-radius: 12px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    }

    .logo {
      text-align: center;
      margin-bottom: 15px;
    }

    .logo img {
      width: 140px;
    }

    h2 {
      text-align: center;
      margin-bottom: 5px;
    }

    .subtitle {
      text-align: center;
      color: gray;
      margin-bottom: 20px;
    }

    label {
      display: block;
      font-weight: bold;
      margin-bottom: 5px;
    }

    input, textarea {
      width: 100%;
      padding: 10px;
      margin-bottom: 12px;
      border-radius: 6px;
      border: 1px solid #ccc;
    }

    textarea { height: 70px; }

    button {
      width: 100%;
      padding: 12px;
      background: linear-gradient(to right, #4b3cff, #6a5cff);
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }

    .whatsapp {
      background: #25D366;
      margin-top: 10px;
    }

    #msg {
      text-align: center;
      margin-top: 10px;
      font-weight: bold;
    }
  </style>
</head>

<body>

<div class="overlay">
<div class="container">

<div class="logo">
  <img src="./logo.png">
</div>

<h2>RightO Careers</h2>
<p class="subtitle">Apply for current openings</p>

<form id="jobForm">

<label>Full Name *</label>
<input type="text" id="name" required>

<label>Email *</label>
<input type="email" id="email" required>

<label>Phone *</label>
<input type="text" id="phone" required>

<label>Alternate Phone</label>
<input type="text" id="altphone">

<label>Aadhaar (Optional)</label>
<input type="text" id="aadhaar">

<label>Qualification *</label>
<input type="text" id="qualification" required>

<label>Address</label>
<textarea id="address"></textarea>

<label>Upload Resume *</label>
<input type="file" id="resume" required>

<button type="submit">Submit Application</button>

</form>

<a href="https://wa.me/916239971732" target="_blank">
  <button class="whatsapp">Chat on WhatsApp</button>
</a>

<p id="msg"></p>

</div>
</div>

<script>
document.getElementById("jobForm").addEventListener("submit", function(e) {
  e.preventDefault();

  const file = document.getElementById("resume").files[0];

  if (!file) {
    alert("Please upload resume");
    return;
  }

  const reader = new FileReader();

  reader.onload = function() {

    const data = {
      name: document.getElementById("name").value,
      email: document.getElementById("email").value,
      phone: document.getElementById("phone").value,
      altphone: document.getElementById("altphone").value,
      aadhaar: document.getElementById("aadhaar").value,
      qualification: document.getElementById("qualification").value,
      address: document.getElementById("address").value,
      file: reader.result,
      filename: file.name
    };

    document.getElementById("msg").innerHTML = "Submitting...";

    fetch("https://script.google.com/macros/s/AKfycbx_Ji8KbkhRXBBUIIHApRhbTTys_-PW96F_JPlODv-s6gjSJRjLjcyoI3vFNZo-4tRf/exec", {
      method: "POST",
      body: JSON.stringify(data)
    })
    .then(res => res.text())
    .then(res => {
      document.getElementById("msg").innerHTML = res;
      document.getElementById("jobForm").reset();
    })
    .catch(err => {
      document.getElementById("msg").innerHTML = "Error ❌";
      console.error(err);
    });
  };

  reader.readAsDataURL(file);
});
</script>

</body>
</html>
