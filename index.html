<!DOCTYPE html>
<html>
<head>
  <title>RightO Careers</title>

  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: 'Segoe UI', Arial, sans-serif;
      background: url('https://images.unsplash.com/photo-1497366216548-37526070297c') no-repeat center/cover;
    }

    .overlay {
      background: rgba(0,0,0,0.65);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 15px;
    }

    .container {
      width: 100%;
      max-width: 420px;
      background: #ffffff;
      padding: 30px 25px;
      border-radius: 14px;
      box-shadow: 0 15px 40px rgba(0,0,0,0.4);
      animation: fadeIn 0.6s ease;
    }

    @keyframes fadeIn {
      from {opacity: 0; transform: translateY(20px);}
      to {opacity: 1; transform: translateY(0);}
    }

    .logo {
      text-align: center;
      margin-bottom: 10px;
    }

    .logo img {
      width: 130px;
    }

    h2 {
      text-align: center;
      margin: 5px 0;
      font-weight: 600;
    }

    .subtitle {
      text-align: center;
      color: #777;
      margin-bottom: 20px;
      font-size: 14px;
    }

    input, textarea {
      width: 100%;
      padding: 11px;
      margin-bottom: 14px;
      border-radius: 8px;
      border: 1px solid #ddd;
      transition: 0.3s;
    }

    input:focus, textarea:focus {
      border-color: #4b3cff;
      outline: none;
      box-shadow: 0 0 5px rgba(75,60,255,0.3);
    }

    textarea {
      height: 70px;
    }

    button {
      width: 100%;
      padding: 13px;
      background: linear-gradient(135deg, #4b3cff, #6a5cff);
      color: white;
      border: none;
      border-radius: 8px;
      font-weight: bold;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      transform: scale(1.02);
      opacity: 0.95;
    }

    .whatsapp {
      background: #25D366;
      margin-top: 10px;
    }

    #msg {
      text-align: center;
      margin-top: 10px;
      font-weight: 500;
    }
  </style>
</head>

<body>

<div class="overlay">
<div class="container">

<div class="logo">
  <img src="./logo.png">
</div>

<h2>RightO Careers</h2>
<p class="subtitle">Apply for current openings</p>

<form id="jobForm">

<input type="text" id="name" placeholder="Full Name" required>
<input type="email" id="email" placeholder="Email" required>
<input type="text" id="phone" placeholder="Phone" required>
<input type="text" id="altphone" placeholder="Alternate Phone">
<input type="text" id="aadhaar" placeholder="Aadhaar (Optional)">
<input type="text" id="qualification" placeholder="Qualification" required>
<textarea id="address" placeholder="Address"></textarea>

<button type="submit">Submit Application</button>

</form>

<a href="https://wa.me/916239971732" target="_blank">
  <button class="whatsapp">Chat on WhatsApp</button>
</a>

<p id="msg"></p>

</div>
</div>

<script>
document.getElementById("jobForm").addEventListener("submit", function(e) {
  e.preventDefault();

  const data = {
    name: name.value,
    email: email.value,
    phone: phone.value,
    altphone: altphone.value,
    aadhaar: aadhaar.value,
    qualification: qualification.value,
    address: address.value
  };

  document.getElementById("msg").innerHTML = "Submitting...";

  fetch("PASTE_YOUR_SCRIPT_URL_HERE", {
    method: "POST",
    body: JSON.stringify(data)
  })
  .then(res => res.text())
  .then(() => {
    document.getElementById("msg").innerHTML = "Application Submitted ✅";
    document.getElementById("jobForm").reset();
  })
  .catch(() => {
    document.getElementById("msg").innerHTML = "Error ❌";
  });
});
</script>

</body>
</html>
